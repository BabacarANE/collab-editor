server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Toutes les routes vers index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache les assets statiques
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}