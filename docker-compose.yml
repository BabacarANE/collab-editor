services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: collabuser
      POSTGRES_PASSWORD: collabpass123
      POSTGRES_DB: collab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabuser -d collab"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:20-slim
    working_dir: /app
    command: sh -c "apt-get update -y && apt-get install -y openssl chromium fonts-liberation libatk-bridge2.0-0 libatk1.0-0 libcairo2 libcups2 libdbus-1-3 libdrm2 libexpat1 libgbm1 libglib2.0-0 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxkbcommon0 libxrandr2 libxshmfence1 ca-certificates wget && npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @collab/api exec prisma generate && pnpm --filter @collab/api run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://collabuser:collabpass123@postgres:5432/collab
      JWT_SECRET: change_me_in_production
      PORT: 3000
      CI: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    depends_on:
      postgres:
        condition: service_healthy

  collab:
    image: node:20-slim
    working_dir: /app/apps/collab
    command: sh -c "npm install && npm run dev"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - collab_node_modules:/app/apps/collab/node_modules
    environment:
      JWT_SECRET: change_me_in_production
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:29092
      COLLAB_PORT: 4000
    depends_on:
      - api
      - redis

  frontend:
    image: node:20-slim
    working_dir: /app/apps/frontend
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - api

  persistence:
      image: node:20-slim
      working_dir: /app/apps/persistence
      command: sh -c "apt-get update -y && apt-get install -y openssl && npm install && npm run prisma:generate && npm run dev"
      volumes:
        - .:/app
        - persistence_node_modules:/app/apps/persistence/node_modules
      environment:
        DATABASE_URL: postgresql://collabuser:collabpass123@postgres:5432/collab
        KAFKA_BROKER: kafka:29092
      depends_on:
        postgres:
          condition: service_healthy
        kafka:
          condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  collab_node_modules:
  persistence_node_modules: