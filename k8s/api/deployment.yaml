apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: collab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api
          image: ghcr.io/babacarane/collab-editor/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: collab-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: collab-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15