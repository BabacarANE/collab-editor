apiVersion: apps/v1
kind: Deployment
metadata:
  name: collab
  namespace: collab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collab
  template:
    metadata:
      labels:
        app: collab
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: collab
          image: ghcr.io/babacarane/collab-editor/collab:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: collab-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: collab-secrets
                  key: JWT_SECRET
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10